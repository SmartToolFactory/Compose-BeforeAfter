name: Trigger Build on Jitpack

on:
  push:
    paths-ignore:
      - "**/*.md"
    branches:
      - master
    tags:
      - "*"

concurrency:
  group: jitpack-${{ github.workflow }}-${{ github.ref_type == 'branch' && github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SDK_NAME: "Compose-BeforeAfter"
      USERNAME: "SmartToolFactory"
      BASE_URL: "https://jitpack.io/api/builds/com.github.SmartToolFactory/Compose-BeforeAfter"
    steps:
      - name: Trigger JitPack build
        run: |
          set -euo pipefail

          trigger_build() {
            local version="$1"
            curl --fail --silent --show-error --location \
              --retry 3 --retry-all-errors \
              --connect-timeout 10 --max-time 60 \
              "${BASE_URL}/${version}"
          }

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            trigger_build "${GITHUB_REF_NAME}"
            exit 0
          fi

          trigger_build "master-SNAPSHOT"
          trigger_build "${GITHUB_SHA::10}"
